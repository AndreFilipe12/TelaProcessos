<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login no Sistema</title>
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
<header class="main-header">
    <h1>Secretaria de Inovação e Tecnologia</h1>
    <img src="../img/semit.png" class="header-logo" alt="Logo SEMIT">
</header>

<main class="main-content">
    <section class="page-container login-container">
        <h2 class="page-title">Login</h2>
        
        <div class="form-group">
            <input id="usuario" class="form-input" placeholder="Nome de usuário">
        </div>
        
        <div class="form-group">
            <input id="senha" type="password" class="form-input" placeholder="Senha">
        </div>
        
        <button class="btn-primary" onclick="login()">Entrar</button>
    </section>
</main>
<script src="../js/script.js"></script>
</body>
</html>
