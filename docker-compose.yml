version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: semit-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - ./init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
      - mongodb_data:/data/db
    networks:
      - semit-network

  mongo-express:
    image: mongo-express:latest
    container_name: semit-mongo-express
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    depends_on:
      - mongodb
    networks:
      - semit-network

  app:
    build: .
    container_name: semit-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/sistema
      - NODE_ENV=production
    depends_on:
      - mongodb
    networks:
      - semit-network

networks:
  semit-network:
    driver: bridge

volumes:
  mongodb_data: